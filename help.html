    <section class="cardx">
      <i class="fas fa-shield-alt" style="font-size: 2rem; color: var(--accent); margin-bottom: 10px;"></i>

      <ul class="contact-list">
        <li><i class="fas fa-user-graduate"></i> <b>School Counselor:</b> (insert number)</li>
        <li><i class="fas fa-chalkboard-teacher"></i> <b>Trusted Teacher/Coach:</b> (insert contact)</li>
        <li><i class="fas fa-ambulance"></i> <b>Emergency Services:</b> (insert local number)</li>
      </ul>
      <div class="footer-safe">
        MindHoops is a reflection tool, not a medical service.
      </div>
    </section>

    <nav class="navbar-bottom">

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MindHoops • Tip</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="tip">
  <main class="container-narrow">
    <div class="step-indicator">
      <span class="step completed">1. Vent</span>
      <span class="step active">2. Tip</span>
      <span class="step">3. Reflect</span>
      <span class="step">4. Track</span>
    </div>

    <div class="brand">
      <div class="logo"><img src="assets/logo.svg" alt=""></div>
      <h1>Bounce Back Tip</h1>
    </div>

    <section class="cardx">
      <p class="small">Take 20 seconds to read and breathe slowly.</p>

      <div class="tip-card">
        <i class="fas fa-lightbulb"></i>
        <h2 id="tipTitle"></h2>
        <p id="tipText" class="small"></p>
      </div>

      <button id="nextBtn" class="btnx btn-accent">
        <i class="fas fa-arrow-right"></i> Continue
      </button>
    </section>

    <!-- Bottom Navigation -->
    <nav class="navbar-bottom">
      <div class="navwrap">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="help.html"><i class="fas fa-question-circle"></i> Help</a>
        <a href="#" id="resetNav"><i class="fas fa-redo-alt"></i> New</a>
      </div>
    </nav>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
